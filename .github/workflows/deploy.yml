name: Terraform Deploy LocalStack

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Run LocalStack
        run: |
          docker run -d --name localstack \
            -p 4566:4566 \
            -e SERVICES=s3 \
            -e AWS_DEFAULT_REGION=us-east-1 \
            -e GATEWAY_LISTEN=0.0.0.0:4566 \
            localstack/localstack:3.8.1

      - name: Wait for LocalStack
        run: |
          for i in {1..60}; do
            if curl -s http://127.0.0.1:4566/_localstack/health; then
              echo "LocalStack is ready"
              exit 0
            fi
            echo "Waiting for LocalStack..."
            docker logs --tail 20 localstack || true
            sleep 5
          done
          docker logs localstack
          exit 1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve
